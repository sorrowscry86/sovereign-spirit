version: '3.8'

services:
  # =========================================
  # 1. MIDDLEWARE (The Brain)
  # =========================================
  middleware:
    build: .
    container_name: sovereign_middleware
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-voidcat}:${POSTGRES_PASSWORD:-sovereign_spirit}@postgres:5432/${POSTGRES_DB:-voidcat_rdc}
      - VOIDC_WEAVIATE_URL=http://weaviate:8080
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-voidcat_sovereign}
    depends_on:
      - postgres
      - neo4j
      - weaviate
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - sovereign_net
    restart: unless-stopped

  # =========================================
  # 2. VECTOR DATABASE (The Memory)
  # =========================================
  weaviate:
    image: semitechnologies/weaviate:1.24.1
    container_name: sovereign_vector
    ports:
      - "8090:8080"
      - "50051:50051"
    environment:
      - QUERY_DEFAULTS_LIMIT=25
      - AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED=true
      - PERSISTENCE_DATA_PATH=/var/lib/weaviate
      - DEFAULT_VECTORIZER_MODULE=none
      - ENABLE_MODULES=text2vec-transformers
    volumes:
      - weaviate_data:/var/lib/weaviate
    networks:
      - sovereign_net

  # =========================================
  # 3. STATE DATABASE (The Soul)
  # =========================================
  postgres:
    image: postgres:15-alpine
    container_name: sovereign_state
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-voidcat}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-sovereign_spirit}
      - POSTGRES_DB=${POSTGRES_DB:-voidcat_rdc}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sovereign_net

  # =========================================
  # 4. GRAPH DATABASE (The Connections)
  # =========================================
  neo4j:
    image: neo4j:5.12-community
    container_name: sovereign_graph
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-voidcat_sovereign}
    volumes:
      - neo4j_data:/data
    networks:
      - sovereign_net

  # =========================================
  # 5. CACHE (The Reflexes)
  # =========================================
  redis:
    image: redis:7-alpine
    container_name: sovereign_cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - sovereign_net

networks:
  sovereign_net:
    driver: bridge

volumes:
  weaviate_data:
  postgres_data:
  neo4j_data:
  redis_data:
