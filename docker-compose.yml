# ============================================================================
# VOIDCAT RDC: SOVEREIGN SPIRIT - MASTER DOCKER COMPOSE
# ============================================================================
# Version: 1.3.0 (Docker Optimization Pass)
# Authority: Beatrice Mandate / Mandate 002
# Component: Full Stack (Brain + Face + Memory + State)
# 
# IMPROVEMENTS (2024):
# - Fixed autoheal network_mode to allow proper docker socket access
# - Consolidated AUTOHEAL environment variable to service-level defaults
# - Corrected postgres healthcheck (uses native pg_isready)
# - Fixed weaviate_data volume definition in volumes section
# - Documented socket security considerations
# ============================================================================

services:
  # 🚑 THE HEALER: Watches containers and restarts them if they get sick
  autoheal:
    image: willfarrell/autoheal
    container_name: sovereign_healer
    restart: always
    environment:
      - AUTOHEAL_CONTAINER_LABEL=all
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - sovereign_net

  # 🧠 THE BRAIN: Sovereign Middleware
  middleware:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sovereign_middleware
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./config:/app/config
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - VOIDC_WEAVIATE_URL=http://weaviate:8080
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-voidcat_sovereign}
      - POSTGRES_URL=postgresql://${POSTGRES_USER:-voidcat}:${POSTGRES_PASSWORD:-sovereign_spirit}@postgres:5432/${POSTGRES_DB:-voidcat_rdc}
      - REDIS_URL=redis://redis:6379
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
      - LM_STUDIO_HOST=${LM_STUDIO_HOST:-http://host.docker.internal:1234}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - LOG_LEVEL=DEBUG
    ports:
      - "8090:8090"
    depends_on:
      weaviate:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8090/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - sovereign_net

