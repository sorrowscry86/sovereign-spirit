services:
  # 🚑 THE HEALER: Watches containers and restarts them if they get sick
  autoheal:
    image: willfarrell/autoheal
    container_name: sovereign_healer
    restart: always
    environment:
      - AUTOHEAL_CONTAINER_LABEL=all
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    network_mode: none

  # 🧠 THE BRAIN: Sovereign Middleware
  middleware:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: sovereign_middleware
    restart: always
    environment:
      - VOIDC_WEAVIATE_URL=http://weaviate:8080
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-voidcat_sovereign}
      - POSTGRES_URL=postgresql://${POSTGRES_USER:-voidcat}:${POSTGRES_PASSWORD:-sovereign_spirit}@postgres:5432/${POSTGRES_DB:-voidcat_rdc}
      - REDIS_URL=redis://redis:6379
      - LOG_LEVEL=INFO
      - AUTOHEAL=true
    depends_on:
      weaviate:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - voidcat-network

  # 👁️ THE FACE: Sovereign Frontend
  frontend:
    build:
      context: ../src/web_ui
      dockerfile: Dockerfile
    container_name: sovereign_frontend
    restart: always
    environment:
      - AUTOHEAL=true
    ports:
      - "5173:80"
    depends_on:
      middleware:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider localhost:80 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - voidcat-network

  # 🧠 THE GRAPH: Neo4j (Modified for Resilience)
  neo4j:
    image: neo4j:5.15.0-community
    container_name: sovereign_graph
    restart: always
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-voidcat_sovereign}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=1G
      - NEO4J_dbms_memory_pagecache_size=256m
      - AUTOHEAL=true
    volumes:
      - neo4j_data:/data
      - ../scripts/neo4j-entrypoint.sh:/custom-entrypoint.sh:ro
    entrypoint: ["/bin/bash", "/custom-entrypoint.sh"]
    ports:
      - "7474:7474"
      - "7687:7687"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider localhost:7474 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - voidcat-network

  # 📚 THE LIBRARY: Weaviate
  weaviate:
    image: semitechnologies/weaviate:1.27.0
    container_name: sovereign_memory
    restart: always
    environment:
      - AUTOHEAL=true
      - QUERY_DEFAULTS_LIMIT=25
      - AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED='true'
      - PERSISTENCE_DATA_PATH='/var/lib/weaviate'
      - CLUSTER_HOSTNAME='node1'
    ports:
      - "8090:8080"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "localhost:8080/v1/meta"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - voidcat-network

  # 🗄️ THE LEDGER: PostgreSQL
  postgres:
    image: pgvector/pgvector:pg15
    container_name: sovereign_state
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-voidcat}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-sovereign_spirit}
      - POSTGRES_DB=${POSTGRES_DB:-voidcat_rdc}
      - AUTOHEAL=true
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-voidcat} -d ${POSTGRES_DB:-voidcat_rdc}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - voidcat-network

  # 💓 THE REFLEX: Redis
  redis:
    image: redis:7-alpine
    container_name: sovereign_cache
    restart: always
    environment:
      - AUTOHEAL=true
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - voidcat-network

networks:
  voidcat-network:
    name: voidcat-sovereign-network
    driver: bridge

volumes:
  weaviate_data:
    name: voidcat-weaviate-data
  neo4j_data:
    name: voidcat-neo4j-data
  postgres_data:
    name: voidcat-postgres-data
  redis_data:
    name: voidcat-redis-data
