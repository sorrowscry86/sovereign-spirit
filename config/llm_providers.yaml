# =============================================================================
# VOIDCAT RDC: SOVEREIGN SPIRIT - LLM PROVIDERS CONFIGURATION
# =============================================================================
# Configure your LLM providers here. All providers use OpenAI-compatible APIs.
# API keys can reference environment variables with ${VAR_NAME} syntax.
# =============================================================================

# The provider to use by default
active_provider: ollama_local

# Fallback order when primary provider fails
fallback_chain:
  - ollama_local
  - lm_studio
  - openrouter

# Provider configurations
providers:
  # -----------------------------------------------------------------------------
  # Local Providers (No API key required)
  # -----------------------------------------------------------------------------

  ollama_local:
    type: ollama
    endpoint: http://localhost:11434/v1
    model: mistral:7b-instruct-v0.2-q4_K_M
    max_tokens: 150
    temperature: 0.7
    timeout: 30.0

  lm_studio:
    type: lm_studio
    endpoint: http://localhost:1234/v1
    model: auto # Uses currently loaded model in LM Studio
    max_tokens: 150
    temperature: 0.7
    timeout: 30.0

  # -----------------------------------------------------------------------------
  # Cloud Providers (API key required)
  # -----------------------------------------------------------------------------

  openrouter:
    type: openrouter
    endpoint: https://openrouter.ai/api/v1
    model: mistralai/mistral-7b-instruct
    api_key: ${OPENROUTER_API_KEY}
    max_tokens: 150
    temperature: 0.7
    timeout: 60.0

  openai:
    type: openai
    endpoint: https://api.openai.com/v1
    model: gpt-3.5-turbo
    api_key: ${OPENAI_API_KEY}
    max_tokens: 150
    temperature: 0.7
    timeout: 60.0
